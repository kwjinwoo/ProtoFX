family: transformers
model_name: CLIP
opset: 17
pretrained: false
seed: 42
input_shapes:
  input_ids: [1, 77]
  pixel_values: [1, 3, 224, 224]
  attention_mask: [1, 77]
input_dtypes:
  input_ids: int64
  attention_mask: int64
tolerances:
  rtol: 1.0e-4
  atol: 1.0e-4
required_extras:
  - models
export_kwargs:
  config_class: CLIPConfig
  model_class: CLIPModel
